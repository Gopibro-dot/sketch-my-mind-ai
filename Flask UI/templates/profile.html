{% extends "base.html" %}
{% block content %}
<h3>My Gallery</h3>
<p class="text-muted">All sketches generated by you are listed below.</p>

<div class="row g-3">
  {% for item in images %}
  <div class="col-md-4">
    <div class="card shadow-sm">
      <img src="{{ url_for('serve_output_file', username=user, filename=item) }}" class="card-img-top" alt="{{ item }}">
      <div class="card-body">
        <p class="card-text small text-muted">{{ item }}</p>
        <a class="btn btn-sm btn-primary" href="{{ url_for('serve_output_file', username=user, filename=item) }}" download>Download</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
