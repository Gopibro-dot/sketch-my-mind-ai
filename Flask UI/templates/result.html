{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card p-4 shadow-sm text-center">
      <h3 class="mb-3">Your Generated Sketch</h3>
      <p class="text-muted">File: <strong>{{ filename }}</strong></p>

      <div class="gallery-preview mb-3">
        <img src="{{ file_url }}" alt="Generated Sketch" class="img-fluid border rounded" style="max-height:600px;">
      </div>

      <div class="d-flex justify-content-center gap-2">
        <a class="btn btn-success" href="{{ file_url }}" download>Download Image</a>
        <a class="btn btn-outline-primary" href="{{ url_for('predict') }}">Generate Another</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
